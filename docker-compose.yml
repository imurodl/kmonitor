services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kmonitor
      POSTGRES_USER: kmonitor
      POSTGRES_PASSWORD: kmonitor
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmonitor"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
