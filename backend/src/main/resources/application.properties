spring.application.name=k-monitor
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:kmonitor}
spring.datasource.username=${DB_USER:kmonitor}
spring.datasource.password=${DB_PASS:kmonitor}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# Flyway
spring.flyway.enabled=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# Scheduling
spring.task.scheduling.pool.size=4

# External API Keys
kmonitor.api-keys.data-go-kr=${DATA_GO_KR_KEY:}
kmonitor.api-keys.firms=${FIRMS_MAP_KEY:}

# Fetch intervals (ms)
kmonitor.fetch.earthquake-interval=300000
kmonitor.fetch.disaster-interval=120000
kmonitor.fetch.air-quality-interval=1800000
kmonitor.fetch.weather-interval=900000
kmonitor.fetch.wildfire-interval=600000

# Logging
logging.level.com.kmonitor=DEBUG
logging.level.org.springframework.web.client=DEBUG
